{% extends "base.html" %}
{% block title %}Login - IMB{% endblock %}
{% block content %}
<div class="container my-5" style="max-width:520px;">
  <div class="bg-panel p-4">
    <h3 class="section-title mb-3">Sign In</h3>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <div class="input-group">
          <input type="password" name="password" class="form-control" id="loginPass" required>
          <button type="button" class="btn btn-outline-secondary" id="toggleLoginPass"><i class="bi bi-eye"></i></button>
        </div>
      </div>
      <button class="btn btn-primary w-100">Login</button>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  document.getElementById("toggleLoginPass")?.addEventListener("click", function () {
    const pass = document.getElementById("loginPass");
    pass.type = pass.type === "password" ? "text" : "password";
  });
</script>
{% endblock %}
