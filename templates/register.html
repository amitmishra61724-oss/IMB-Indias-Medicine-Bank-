{% extends "base.html" %}
{% block title %}Register - IMB{% endblock %}
{% block content %}
<div class="container my-5" style="max-width:760px;">
  <div class="bg-panel p-4">
    <h3 class="section-title mb-3">Create IMB Account</h3>
    <form method="POST">
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label">Name</label><input class="form-control" name="name" required></div>
        <div class="col-md-6"><label class="form-label">Email</label><input type="email" class="form-control" name="email" required></div>
        <div class="col-md-6"><label class="form-label">Password</label><input type="password" class="form-control" name="password" id="regPass" minlength="6" required></div>
        <div class="col-md-6">
          <label class="form-label">Role</label>
          <select class="form-select" name="role" required>
            <option value="receiver">Receiver</option>
            <option value="donor">Donor</option>
          </select>
        </div>
        <div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" name="phone"></div>
        <div class="col-md-6"><label class="form-label">City</label><input class="form-control" name="city" required></div>
        <div class="col-12"><label class="form-label">Address</label><textarea class="form-control" name="address" rows="2"></textarea></div>
      </div>
      <div id="passHint" class="form-text mt-2">Password must be at least 6 characters.</div>
      <button class="btn btn-primary mt-3">Create Account</button>
    </form>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
  const regPass = document.getElementById("regPass");
  const passHint = document.getElementById("passHint");
  regPass?.addEventListener("input", function () {
    passHint.className = this.value.length >= 6 ? "form-text text-success mt-2" : "form-text text-danger mt-2";
  });
</script>
{% endblock %}
